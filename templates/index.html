<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Recommender System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f7;
      color: #333;
      padding-bottom: 50px;
    }

    /* Navbar */
    .navbar {
      background-color: #6c63ff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .brand {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.3s;
    }

    .nav-links a:hover {
      opacity: 0.8;
    }

    /* Header */
    h1 {
      text-align: center;
      margin: 40px 0 30px;
      font-size: 2.5rem;
      font-weight: 600;
    }

    /* Grid Layout */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: auto;
      padding: 0 20px;
    }

    /* Book Card */
    .book-card {
      background-color: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      transform: scale(1.02);
    }

    .book-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .book-info {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .book-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #6c63ff;
    }

    .book-author {
      color: #666;
      font-size: 0.95rem;
    }

    .book-meta {
      font-size: 0.9rem;
      color: #444;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .book-card img {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="brand" href="#">Book Recommender</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/recommend">Recommend</a>
    </div>
  </nav>

  <!-- Header -->
  <h1>Top 50 Books</h1>

  <!-- Book Grid -->
  <div class="grid-container">
    {% for i in range(book_name|length) %}
    <div class="book-card">
      <img src="{{ image[i] }}" alt="Book Cover">
      <div class="book-info">
        <div class="book-title">{{ book_name[i] }}</div>
        <div class="book-author">{{ author[i] }}</div>
        <div class="book-meta">Votes: {{ votes[i] }} | Rating: {{ rating[i] }}</div>
      </div>
    </div>
    {% endfor %}
  </div>

</body>
</html>
