<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BookMatch - Discover Your Next Read</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #c9a84c;
      --accent-light: #e0c36a;
      --accent-glow: rgba(201, 168, 76, 0.15);
      --radius: 12px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      max-width: 680px;
      margin: 0 auto;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem 80px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent);
    }

    .card-img {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: #111;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 14px 16px 18px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-author {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      font-weight: 600;
    }

    .rating svg {
      width: 14px;
      height: 14px;
      fill: var(--accent);
    }

    .votes {
      color: var(--text-muted);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .hero h1 { font-size: 2rem; }
      .hero { padding: 40px 20px 30px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; padding: 0 16px 60px; }
      .card-img { height: 220px; }
      nav { padding: 0 1rem; }
    }

    /* Fade-in animation */
    .card {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">BookMatch</a>
    <div class="nav-links">
      <a href="/" class="active">Popular</a>
      <a href="/recommend">Recommend</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Top 50 <span>Popular</span> Books</h1>
    <p>The most loved books by our readers, ranked by ratings and votes.</p>
  </div>

  <div class="grid">
    {% for i in range(book_name|length) %}
    <div class="card" style="animation-delay: {{ i * 30 }}ms">
      <div class="card-img">
        <img src="{{ image[i] }}" alt="{{ book_name[i] }}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-title">{{ book_name[i] }}</div>
        <div class="card-author">{{ author[i] }}</div>
        <div class="card-meta">
          <div class="rating">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            {{ "%.1f"|format(rating[i]) }}
          </div>
          <div class="votes">{{ votes[i] }} votes</div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  <footer>BookMatch &mdash; Discover books you'll love</footer>

</body>
</html>
